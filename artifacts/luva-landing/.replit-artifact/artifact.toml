kind = "web"
previewPath = "/"
title = "Luva de Aplicativo"
version = "1.0.0"
id = "artifacts/luva-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22741

[services.development]
run = "pnpm --filter @workspace/luva-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/luva-landing", "run", "build" ]
publicDir = "artifacts/luva-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22741"
BASE_PATH = "/"
